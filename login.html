<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🔐 Login - CASA NOA</title>

<!-- ICONO -->
<link rel="icon" href='data:image/svg+xml,
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<rect width="100" height="100" fill="black"/>
<text x="50%" y="55%" font-size="50" text-anchor="middle" fill="white">🏨</text>
</svg>'>

<style>

/* 🔥 FONDO GENERAL */
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1e1e2f, #2c2c54);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 🔹 CONTENEDOR */
.login-box {
    background: white;
    padding: 40px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
    animation: aparecer 0.6s ease;
}

/* 🔹 ANIMACIÓN */
@keyframes aparecer {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* 🔹 TÍTULO */
.login-box h2 {
    margin-bottom: 20px;
    color: #1e1e2f;
}

/* 🔹 INPUTS */
.login-box input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* 🔹 BOTÓN */
.login-box button {
    width: 100%;
    padding: 12px;
    background: #007BFF;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.login-box button:hover {
    background: #0056b3;
    transform: scale(1.05);
}

/* 🔹 MENSAJE */
.error {
    color: red;
    margin-top: 10px;
    font-size: 14px;
}

</style>
</head>

<body>

<div class="login-box">
    <h2>🏨 CASA NOA</h2>

    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>

    <div id="mensaje" class="error"></div>
</div>

<script>
function login() {
    const usuario = document.getElementById('usuario').value;
    const password = document.getElementById('password').value;

    fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario, password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            window.location.href = '/app/index.html';
        } else {
            document.getElementById('mensaje').innerText = '❌ Usuario o contraseña incorrectos';
        }
    });
}
</script>

</body>
</html>
