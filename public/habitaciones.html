<script>

const API = window.location.origin;

function irInicio(){ window.location.href = "/"; }
function logout(){
  localStorage.removeItem('logueado');
  window.location.href = '/';
}

const habitaciones = [
  101,102,103,104,105,106,107,
  201,202,203,204,205,206,207,
  301,302,303,304,305,306
];

let contadorId = 1;

// 🔥 AGREGAR FILA
function agregarFila(){

  const tabla = document.getElementById("cuerpo");
  const fila = document.createElement("tr");

  let html = `
    <td>${contadorId++}</td>
    <td>
      <input class="encargado" placeholder="Encargado"><br>
      <input type="color" class="color"><br>
      <input type="date" class="fechaPrincipal">
    </td>
  `;

  habitaciones.forEach(()=>{
    html += `
      <td>
        <input type="date" class="inicio"><br>
        <input type="date" class="fin"><br>
        <div class="dias">0</div>
      </td>
    `;
  });

  html += `<td class="total">0</td>`;

  html += `
    <td>
      <button onclick="guardarFila(this)">💾</button>
      <button onclick="editarFila(this)">✏️</button>
      <button onclick="eliminarFila(this)">❌</button>
    </td>
  `;

  fila.innerHTML = html;
  tabla.insertBefore(fila, tabla.firstChild);

  activarEventos(fila);
}

// 🔥 EDITAR
function editarFila(btn){
  const fila = btn.closest("tr");
  fila.querySelectorAll("input").forEach(i=> i.disabled = !i.disabled);
}

// 🔥 EVENTOS
function activarEventos(fila){

  const celdas = fila.querySelectorAll("td");

  for(let i=2;i<=21;i++){

    const inicio = celdas[i].querySelector(".inicio");
    const fin = celdas[i].querySelector(".fin");
    const diasDiv = celdas[i].querySelector(".dias");

    function calcular(){

      if(inicio.value && fin.value){

        const inicioDate = new Date(inicio.value + "T00:00:00");
        const finDate = new Date(fin.value + "T00:00:00");

        const diff = (finDate - inicioDate)/(1000*60*60*24);

        diasDiv.innerText = diff > 0 ? diff : 0;

      } else {
        diasDiv.innerText = 0;
      }

      calcularTotalFila(fila);
    }

    inicio.addEventListener("change", calcular);
    fin.addEventListener("change", calcular);
  }
}

// 🔥 TOTAL
function calcularTotalFila(fila){
  let total = 0;
  fila.querySelectorAll(".dias").forEach(d=>{
    if(parseInt(d.innerText)>0) total++;
  });
  fila.querySelector(".total").innerText = total;
}

// 🔥 GUARDAR
async function guardarFila(btn){

  const fila = btn.closest("tr");

  const encargado = fila.querySelector(".encargado").value;
  const fecha = fila.querySelector(".fechaPrincipal").value;
  const color = fila.querySelector(".color").value;

  if(!encargado || !fecha){
    alert("Falta encargado o fecha");
    return;
  }

  const celdas = fila.querySelectorAll("td");
  const requests = [];

  for(let i=2;i<=21;i++){

    const inicio = celdas[i].querySelector(".inicio").value;
    const fin = celdas[i].querySelector(".fin").value;

    if(inicio && fin){

      const req = fetch(`${API}/habitaciones`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          habitacion: habitaciones[i-2],
          encargado,
          fecha,
          color,
          inicio,
          fin
        })
      });

      requests.push(req);
    }
  }

  if(requests.length === 0){
    alert("No llenaste ninguna habitación");
    return;
  }

  try{
    await Promise.all(requests);

    alert("Fila guardada ✅");

    // 🔥 ESPERA Y RECARGA
    setTimeout(()=>{
      cargarFilasGuardadas();
    },300);

  }catch(e){
    console.error(e);
    alert("Error guardando ❌");
  }
}

// 🔥 ELIMINAR
function eliminarFila(btn){

  if(!confirm("¿Eliminar fila?")) return;

  const fila = btn.closest("tr");

  const encargado = fila.querySelector(".encargado").value;
  const fecha = fila.querySelector(".fechaPrincipal").value;

  fetch(`${API}/habitaciones`)
  .then(r=>r.json())
  .then(data=>{

    const eliminar = data.filter(d =>
      d.encargado === encargado && d.fecha.includes(fecha)
    );

    eliminar.forEach(i=>{
      fetch(`${API}/habitaciones/${i.id}`,{method:'DELETE'});
    });

    fila.remove();
  });
}

// 🔥 CARGAR
function cargarFilasGuardadas(){

  fetch(`${API}/habitaciones`)
  .then(r=>r.json())
  .then(data=>{

    const grupos = {};

    data.forEach(item=>{
      const key = item.encargado+"_"+item.fecha;

      if(!grupos[key]){
        grupos[key]={
          encargado:item.encargado,
          fecha:item.fecha,
          color:item.color||"#000",
          habitaciones:[]
        };
      }

      grupos[key].habitaciones.push(item);
    });

    const ordenados = Object.values(grupos)
      .sort((a,b)=> new Date(b.fecha) - new Date(a.fecha));

    const tabla = document.getElementById("cuerpo");
    tabla.innerHTML="";

    ordenados.forEach((grupo, index)=>{

      const fila = document.createElement("tr");

      let html = `
        <td>${ordenados.length - index}</td>
        <td>
          <input class="encargado" value="${grupo.encargado}"><br>
          <input type="color" class="color" value="${grupo.color}"><br>
          <input type="date" class="fechaPrincipal" value="${grupo.fecha.split('T')[0]}">
        </td>
      `;

      habitaciones.forEach(()=>{
        html+=`
          <td>
            <input type="date" class="inicio"><br>
            <input type="date" class="fin"><br>
            <div class="dias">0</div>
          </td>
        `;
      });

      html+=`<td class="total">0</td>`;

      html+=`
        <td>
          <button onclick="guardarFila(this)">💾</button>
          <button onclick="editarFila(this)">✏️</button>
          <button onclick="eliminarFila(this)">❌</button>
        </td>
      `;

      fila.innerHTML = html;
      tabla.appendChild(fila);

      const celdas = fila.querySelectorAll("td");

      grupo.habitaciones.forEach(h=>{

        const indexHab = habitaciones.indexOf(Number(h.habitacion));

        if(indexHab !== -1){

          const celda = celdas[indexHab + 2];
          const inicio = celda.querySelector(".inicio");
          const fin = celda.querySelector(".fin");
          const dias = celda.querySelector(".dias");

          const inicioVal = h.inicio ? h.inicio.split('T')[0] : "";
          const finVal = h.fin ? h.fin.split('T')[0] : "";

          inicio.value = inicioVal;
          fin.value = finVal;

          if(inicioVal && finVal){

            const inicioDate = new Date(inicioVal + "T00:00:00");
            const finDate = new Date(finVal + "T00:00:00");

            const diff = (finDate - inicioDate)/(1000*60*60*24);

            dias.innerText = diff > 0 ? diff : 0;

          }
        }

      });

      activarEventos(fila);
      calcularTotalFila(fila);
    });

  });
}

cargarFilasGuardadas();

</script>
