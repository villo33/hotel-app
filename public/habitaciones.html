<!DOCTYPE html>
<html>
<head>
<title>Habitaciones</title>

<style>



/* 🔥 RESET IMPORTANTE */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow-x: auto; /* permite scroll horizontal sin romper fondo */
}

/* 🌈 FONDO COMPLETO SIN CORTES */
body {
  font-family: Arial;

  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  background-attachment: fixed; /* 🔥 clave para que no se corte */

  color: #333;
}

/* ✨ EFECTO VISUAL SUAVE */
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08), transparent),
              radial-gradient(circle at 80% 70%, rgba(0,123,255,0.15), transparent);

  z-index: 0;
  pointer-events: none;
}

/* 🔝 BARRA SUPERIOR */
.top-bar {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 1000;
}

/* 📦 CONTENEDOR (CLAVE) */
.container {
  position: relative;
  z-index: 1;

  width: max-content; /* 🔥 evita que se corte con tablas grandes */
  min-width: 100%;

  margin: 80px auto 20px;

  background: rgba(255, 255, 255, 0.96);
  backdrop-filter: blur(6px);

  padding: 20px;
  border-radius: 15px;

  box-shadow: 0px 15px 40px rgba(0,0,0,0.4);
}

/* 📊 TABLA */
table {
  border-collapse: collapse;
  width: max-content; /* 🔥 importante para muchas columnas */
  min-width: 100%;
  background: white;
}

/* 🔝 ENCABEZADO FIJO */
th {
  background: linear-gradient(90deg, #2563eb, #1d4ed8);
  color: white;
  padding: 10px;

  position: sticky;
  top: 0;
  z-index: 5;
}

/* 🔲 CELDAS */
td {
  border: 1px solid #ddd;
  padding: 5px;
  text-align: center;
}

/* ✍️ INPUTS */
input {
  width: 80px;
  font-size: 11px;
  padding: 3px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

/* 🔘 BOTONES */
button {
  padding: 6px 12px;
  margin: 3px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  color: white;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* COLORES */
.btn-inicio { background: #22c55e; }
.btn-logout { background: #ef4444; }
.btn-guardar { background: #3b82f6; }
.btn-editar { background: #facc15; color: black; }
.btn-eliminar { background: #ef4444; }

/* ➕ BOTÓN AGREGAR */
button[onclick="agregarFila()"] {
  background: #22c55e;
  font-weight: bold;
}

/* 🔢 TOTAL */
.total {
  color: #2563eb;
  font-weight: bold;
}

/* ✨ HOVER */
tr:hover {
  background: #f1f5f9;
}





</style>
</head>

<body>

<div class="top-bar">
  <button class="btn-inicio" onclick="irInicio()">🏠 Inicio</button>
  <button class="btn-logout" onclick="logout()">🚪 Cerrar sesión</button>
</div>

<div class="container">

<h2>🏨 CONTROL DE HABITACIONES</h2>

<button class="btn-agregar" onclick="agregarFila()">➕ Agregar Día</button>

<table>
<thead>
<tr>
  <th>ID</th>
  <th>Encargado / Fecha</th>

  <th>101</th><th>102</th><th>103</th><th>104</th><th>105</th><th>106</th><th>107</th>
  <th>201</th><th>202</th><th>203</th><th>204</th><th>205</th><th>206</th><th>207</th>
  <th>301</th><th>302</th><th>303</th><th>304</th><th>305</th><th>306</th>

  <th>Total</th>
  <th>Acciones</th>
</tr>
</thead>

<tbody id="cuerpo"></tbody>
</table>

</div>

<script>

const API = window.location.origin;

function irInicio(){ window.location.href = "/"; }
function logout(){
  localStorage.removeItem('logueado');
  window.location.href = '/';
}

const habitaciones = [
  101,102,103,104,105,106,107,
  201,202,203,204,205,206,207,
  301,302,303,304,305,306
];

// 🔥 CONTROL ID CORRECTO
let contadorId = 1;

// 🔥 AGREGAR FILA ARRIBA (ID CRECE HACIA ARRIBA)
function agregarFila(){

  const tabla = document.getElementById("cuerpo");
  const fila = document.createElement("tr");

  let html = `
    <td>${contadorId++}</td>
    <td>
      <input class="encargado" placeholder="Encargado"><br>
      <input type="color" class="color"><br>
      <input type="date" class="fechaPrincipal">
    </td>
  `;

  habitaciones.forEach(()=>{
    html += `
      <td>
        <input type="date" class="inicio"><br>
        <input type="date" class="fin"><br>
        <div class="dias">0</div>
      </td>
    `;
  });

  html += `<td class="total">0</td>`;

  html += `
    <td>
      <button class="btn-guardar" onclick="guardarFila(this)">💾</button>
      <button class="btn-editar" onclick="editarFila(this)">✏️</button>
      <button class="btn-eliminar" onclick="eliminarFila(this)">❌</button>
    </td>
  `;

  fila.innerHTML = html;

  // 🔥 SIEMPRE ARRIBA
  tabla.insertBefore(fila, tabla.firstChild);

  activarEventos(fila);
}

// 🔥 EDITAR
function editarFila(btn){
  const fila = btn.closest("tr");

  fila.querySelectorAll("input").forEach(i=>{
    i.disabled = !i.disabled;
  });
}

// 🔥 EVENTOS
function activarEventos(fila){

  const celdas = fila.querySelectorAll("td");

  for(let i=2;i<=21;i++){

    const inicio = celdas[i].querySelector(".inicio");
    const fin = celdas[i].querySelector(".fin");
    const diasDiv = celdas[i].querySelector(".dias");

    function calcular(){
      if(inicio.value && fin.value){
        const diff = (new Date(fin.value) - new Date(inicio.value))/(1000*60*60*24);
        diasDiv.innerText = diff>0?diff:0;
      }
      calcularTotalFila(fila);
    }

    inicio.addEventListener("change", calcular);
    fin.addEventListener("change", calcular);
  }
}

// 🔥 TOTAL
function calcularTotalFila(fila){
  let total = 0;
  fila.querySelectorAll(".dias").forEach(d=>{
    if(parseInt(d.innerText)>0) total++;
  });
  fila.querySelector(".total").innerText = total;
}

// 🔥 GUARDAR

async function guardarFila(btn){

  const fila = btn.closest("tr");

  const encargado = fila.querySelector(".encargado").value;
  const fecha = fila.querySelector(".fechaPrincipal").value;
  const color = fila.querySelector(".color").value;

  if(!encargado || !fecha){
    alert("Falta encargado o fecha");
    return;
  }

  const celdas = fila.querySelectorAll("td");

  try {

    const promesas = [];

    for(let i = 2; i <= 21; i++){

      const celda = celdas[i];
      if(!celda) continue;

      const inicioEl = celda.querySelector(".inicio");
      const finEl = celda.querySelector(".fin");

      if(!inicioEl || !finEl) continue;

      const inicio = inicioEl.value;
      const fin = finEl.value;

      if(inicio && fin){

        promesas.push(
          fetch(`${API}/habitaciones`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              habitacion: habitaciones[i - 2],
              encargado,
              fecha: fecha.split('T')[0],
              color,
              inicio,
              fin
            })
          })
          .then(async res => {

            // 🔥 FIX CLAVE: no romper si NO es JSON
            const text = await res.text();

            if(!res.ok) {
              throw new Error(text || "Error guardando habitación");
            }

            return text;
          })
        );
      }
    }

    await Promise.all(promesas);

    alert("Fila guardada correctamente ✅");

    setTimeout(() => {
      cargarFilasGuardadas();
    }, 300);

  } catch (error) {
    console.error(error);
    alert("Error guardando la fila ❌");
  }
}
// 🔥 ELIMINAR
function eliminarFila(btn){

  if(!confirm("¿Eliminar fila?")) return;

  const fila = btn.closest("tr");

  const encargado = fila.querySelector(".encargado").value;
  const fecha = fila.querySelector(".fechaPrincipal").value;

  fetch(`${API}/habitaciones`)
  .then(r=>r.json())
  .then(data=>{

    const eliminar = data.filter(d =>
      d.encargado === encargado && d.fecha.includes(fecha)
    );

    eliminar.forEach(i=>{
      fetch(`${API}/habitaciones/${i.id}`,{method:'DELETE'});
    });

    fila.remove();
  });
}

// 🔥 CARGAR ORDENADO + ID CORRECTO (MAS RECIENTE ARRIBA)
function cargarFilasGuardadas(){

  fetch(`${API}/habitaciones`)
  .then(r=>r.json())
  .then(data=>{

    const grupos = {};

    // 🔥 AGRUPAR
    data.forEach(item=>{
      const key = item.encargado+"_"+item.fecha;

      if(!grupos[key]){
        grupos[key]={
          encargado:item.encargado,
          fecha:item.fecha,
          color:item.color||"#000",
          habitaciones:[]
        };
      }

      grupos[key].habitaciones.push(item);
    });

    // 🔥 ORDENAR POR FECHA (MAS NUEVO PRIMERO)
    const ordenados = Object.values(grupos)
      .sort((a,b)=> new Date(b.fecha) - new Date(a.fecha));

    const tabla = document.getElementById("cuerpo");
    tabla.innerHTML="";

    // 🔥 CREAR FILAS CON ID INVERSO
    ordenados.forEach((grupo, index)=>{

      const idVisual = ordenados.length - index; // 🔥 CLAVE

      const fila = document.createElement("tr");

      let html = `
        <td>${idVisual}</td>
        <td>
          <input class="encargado" value="${grupo.encargado}" style="color:${grupo.color}"><br>
          <input type="color" class="color" value="${grupo.color}"><br>
          <input type="date" class="fechaPrincipal" value="${grupo.fecha.split('T')[0]}">
        </td>
      `;

      habitaciones.forEach(()=>{
        html+=`
          <td>
            <input type="date" class="inicio"><br>
            <input type="date" class="fin"><br>
            <div class="dias">0</div>
          </td>
        `;
      });

      html+=`<td class="total">0</td>`;

      html+=`
        <td>
          <button class="btn-guardar" onclick="guardarFila(this)">💾</button>
          <button class="btn-editar" onclick="editarFila(this)">✏️</button>
          <button class="btn-eliminar" onclick="eliminarFila(this)">❌</button>
        </td>
      `;

      fila.innerHTML = html;
      tabla.appendChild(fila);

      const celdas = fila.querySelectorAll("td");

      // 🔥 RELLENAR DATOS
      grupo.habitaciones.forEach(h=>{

        const indexHab = habitaciones.indexOf(h.habitacion);

        if(indexHab !== -1){

          const inicio = celdas[indexHab + 2].querySelector(".inicio");
          const fin = celdas[indexHab + 2].querySelector(".fin");

          inicio.value = h.inicio?.split('T')[0] || "";
          fin.value = h.fin?.split('T')[0] || "";

          const diff = (new Date(h.fin) - new Date(h.inicio)) / (1000*60*60*24);
          celdas[indexHab + 2].querySelector(".dias").innerText = diff > 0 ? diff : 0;
        }

      });

      activarEventos(fila);
      calcularTotalFila(fila);

    });

  });
}

cargarFilasGuardadas();
</script>

</body>
</html>
