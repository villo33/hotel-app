<script>

const API = window.location.origin;

function irInicio(){ window.location.href = "/"; }
function logout(){
  localStorage.removeItem('logueado');
  window.location.href = '/';
}

const habitaciones = [
  101,102,103,104,105,106,107,
  201,202,203,204,205,206,207,
  301,302,303,304,305,306
];

let contadorId = 1;


// ➕ AGREGAR FILA
function agregarFila(){

  const tabla = document.getElementById("cuerpo");
  const fila = document.createElement("tr");

  let html = `
    <td>${contadorId++}</td>
    <td>
      <input class="encargado" placeholder="Encargado"><br>
      <input type="color" class="color"><br>
      <input type="date" class="fechaPrincipal">
    </td>
  `;

  habitaciones.forEach(()=>{
    html += `
      <td>
        <input type="date" class="inicio"><br>
        <input type="date" class="fin"><br>
        <div class="dias">0</div>
      </td>
    `;
  });

  html += `
    <td class="total">0</td>
    <td>
      <button onclick="guardarFila(this)">💾</button>
      <button onclick="eliminarFila(this)">❌</button>
    </td>
  `;

  fila.innerHTML = html;
  tabla.insertBefore(fila, tabla.firstChild);

  activarEventos(fila);
}


// 💾 GUARDAR (🔥 CORREGIDO)
async function guardarFila(btn){

  const fila = btn.closest("tr");

  const encargado = fila.querySelector(".encargado").value.trim();
  const fecha = fila.querySelector(".fechaPrincipal").value;
  const color = fila.querySelector(".color").value;

  if(!encargado || !fecha){
    alert("Falta encargado o fecha");
    return;
  }

  const celdas = fila.querySelectorAll("td");
  const habitacionesData = [];

  for(let i = 2; i < celdas.length - 2; i++){

    const celda = celdas[i];

    const inicio = celda.querySelector(".inicio").value;
    const fin = celda.querySelector(".fin").value;

    // 🔥 VALIDACIÓN FUERTE (EVITA ERROR 400)
    if(inicio && fin){

      const f1 = new Date(inicio);
      const f2 = new Date(fin);

      if(!isNaN(f1) && !isNaN(f2)){

        habitacionesData.push({
          habitacion: Number(habitaciones[i - 2]), // 🔥 asegurar número
          inicio: inicio,
          fin: fin
        });

      }
    }
  }

  // 🔥 NO enviar vacío
  if(habitacionesData.length === 0){
    alert("No hay habitaciones llenas");
    return;
  }

  // 🔥 DEBUG REAL (puedes verlo en consola)
  console.log("ENVIANDO:", {
    encargado,
    fecha,
    color,
    habitaciones: habitacionesData
  });

  try {

    const res = await fetch(`${API}/habitaciones`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        encargado,
        fecha,
        color,
        habitaciones: habitacionesData
      })
    });

    if(!res.ok){
      const errorText = await res.text();
      console.error("Error servidor:", errorText);
      throw new Error("Error guardando");
    }

    alert("Guardado correcto ✅");

    cargarFilasGuardadas();

  } catch (e){
    console.error(e);
    alert("Error guardando ❌");
  }
}


// ❌ ELIMINAR
function eliminarFila(btn){

  if(!confirm("¿Eliminar?")) return;

  const fila = btn.closest("tr");

  const encargado = fila.querySelector(".encargado").value;
  const fecha = fila.querySelector(".fechaPrincipal").value;

  fetch(`${API}/habitaciones`)
  .then(r=>r.json())
  .then(data=>{

    const eliminar = data.filter(d =>
      d.encargado === encargado &&
      d.fecha === fecha
    );

    eliminar.forEach(i=>{
      fetch(`${API}/habitaciones/${i.id}`, {method:'DELETE'});
    });

    fila.remove();
  });
}


// 📥 CARGAR DATOS (SIN CAMBIOS)
function cargarFilasGuardadas(){

  fetch(`${API}/habitaciones`)
  .then(r=>r.json())
  .then(data=>{

    const grupos = {};

    data.forEach(item=>{

      const key = item.encargado + "_" + item.fecha;

      if(!grupos[key]){
        grupos[key] = {
          encargado: item.encargado,
          fecha: item.fecha,
          color: item.color || "#000",
          habitaciones: [],
          id: item.id
        };
      }

      grupos[key].habitaciones.push(item);

      if(item.id > grupos[key].id){
        grupos[key].id = item.id;
      }
    });

    const ordenados = Object.values(grupos)
      .sort((a,b)=> b.id - a.id);

    const tabla = document.getElementById("cuerpo");
    tabla.innerHTML = "";

    ordenados.forEach((grupo)=>{

      const fila = document.createElement("tr");

      let html = `
        <td>${grupo.id}</td>
        <td>
          <input class="encargado" value="${grupo.encargado}"><br>
          <input type="color" class="color" value="${grupo.color}"><br>
          <input type="date" class="fechaPrincipal" value="${grupo.fecha}">
        </td>
      `;

      habitaciones.forEach(()=>{
        html += `
          <td>
            <input type="date" class="inicio"><br>
            <input type="date" class="fin"><br>
            <div class="dias">0</div>
          </td>
        `;
      });

      html += `
        <td class="total">0</td>
        <td>
          <button onclick="guardarFila(this)">💾</button>
          <button onclick="eliminarFila(this)">❌</button>
        </td>
      `;

      fila.innerHTML = html;
      tabla.appendChild(fila);

      grupo.habitaciones.forEach(h => {

        const index = habitaciones.indexOf(h.habitacion);
        if(index === -1) return;

        const celda = fila.querySelectorAll("td")[index + 2];

        const inicio = celda.querySelector(".inicio");
        const fin = celda.querySelector(".fin");

        inicio.value = h.inicio || "";
        fin.value = h.fin || "";
      });

      activarEventos(fila);

      fila.querySelectorAll(".inicio, .fin").forEach(input=>{
        input.dispatchEvent(new Event("change"));
      });

    });

  });
}


// 🔥 EVENTOS
function activarEventos(fila){

  const celdas = fila.querySelectorAll("td");

  for(let i = 2; i < celdas.length - 2; i++){

    const celda = celdas[i];

    const inicio = celda.querySelector(".inicio");
    const fin = celda.querySelector(".fin");
    const dias = celda.querySelector(".dias");

    function calc(){

      if(inicio.value && fin.value){

        const diff = (new Date(fin.value) - new Date(inicio.value)) / (1000*60*60*24);
        dias.innerText = diff > 0 ? diff : 0;

      } else {
        dias.innerText = 0;
      }

      calcularTotalFila(fila);
    }

    inicio.onchange = calc;
    fin.onchange = calc;
  }
}


// 🔥 TOTAL
function calcularTotalFila(fila){

  let total = 0;

  fila.querySelectorAll("td").forEach((celda, index)=>{

    if(index < 2 || index >= fila.children.length - 2) return;

    const inicio = celda.querySelector(".inicio");
    const fin = celda.querySelector(".fin");

    if(inicio && fin && inicio.value && fin.value){
      total++;
    }

  });

  fila.querySelector(".total").innerText = total;
}

</script>
