<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>📋 Tareas</title>

<style>
    /* 🔥 CONTROL TEXTO LARGO */
.descripcion {
  max-width: 200px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 🔥 FONDO */
body {
  font-family: Arial;
  margin: 0;
  background: linear-gradient(135deg, #1e1e2f, #007BFF);
  color: #333;
}

/* 🔝 BARRA SUPERIOR */
.top-bar {
  position: absolute;
  top: 15px;
  left: 15px;
}

button {
  padding: 8px 12px;
  margin: 3px;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* BOTONES */
.btn-inicio { background: #28a745; }
.btn-hecho { background: #007BFF; }
.btn-eliminar { background: #dc3545; }
.btn-guardar { 
  background: linear-gradient(to right, #0d6efd, #0dcaf0);
}

/* 🔲 CONTENEDOR */
.container {
  width: 80%;
  margin: auto;
  margin-top: 80px;
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
}

/* 🔹 TITULO */
h2 {
  margin-bottom: 20px;
  color: #1e1e2f;
}

/* 🔹 FORM */
.form {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  width: 180px;
}

/* 🔹 TABLA */
table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #007BFF;
  color: white;
}

td, th {
  padding: 10px;
  border: 1px solid #ccc;
  text-align: center;
}

/* 🔹 ESTADOS */
.pendiente {
  color: orange;
  font-weight: bold;
}

.hecho {
  color: green;
  font-weight: bold;
}

</style>
</head>

<body>

<div class="top-bar">
  <button class="btn-inicio" onclick="irInicio()">🏠 Inicio</button>
</div>

<div class="container">
  <h2>📋 Gestión de Tareas</h2>

  <div class="form">
    <input id="descripcion" placeholder="Descripción de la tarea">
    <input id="encargado" placeholder="Encargado">
    <input type="date" id="fecha">
    <button class="btn-guardar" onclick="guardar()">💾 Guardar</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Tarea</th>
        <th>Encargado</th>
        <th>Fecha</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<script>

const API = window.location.origin;

function irInicio(){
  window.location.href = "/";
}
function verTarea(texto){
  alert("📋 Tarea:\n\n" + decodeURIComponent(texto));
}

// 🔥 GUARDAR
async function guardar(){

  const descripcion = document.getElementById("descripcion").value;
  const encargado = document.getElementById("encargado").value;
  const fecha = document.getElementById("fecha").value;

  if(!descripcion || !encargado || !fecha){
    alert("Completa todos los datos");
    return;
  }

  await fetch(`${API}/tareas`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ descripcion, encargado, fecha })
  });

  limpiar();
  cargar();
}

// 🔥 COMPLETAR
async function completar(id){
  await fetch(`${API}/tareas/` + id, {
    method: 'PUT'
  });
  cargar();
}

// 🔥 ELIMINAR
async function eliminar(id){
  if(!confirm("¿Eliminar tarea?")) return;

  await fetch(`${API}/tareas/` + id, {
    method: 'DELETE'
  });
  cargar();
}

// 🔥 LIMPIAR
function limpiar(){
  document.getElementById("descripcion").value = "";
  document.getElementById("encargado").value = "";
  document.getElementById("fecha").value = "";
}

// 🔥 CARGAR
async function cargar(){

  const res = await fetch(`${API}/tareas`);
  const data = await res.json();

  let html = '';

  if(data.length === 0){
    html = `<tr><td colspan="5">No hay tareas</td></tr>`;
  }


  data.forEach(t => {
  html += `
      <td>
        ${t.descripcion.length > 20 ? t.descripcion.substring(0,20) + '...' : t.descripcion}
        <br>
        <button onclick="verTarea('${encodeURIComponent(t.descripcion)}')">👁</button>
      </td>
      <td>${t.encargado || ''}</td>
      <td>${t.fecha.split('T')[0]}</td>
      <td class="${t.estado}">${t.estado}</td>
      <td>
        ${t.estado === 'pendiente' ? 
          `<button class="btn-hecho" onclick="completar(${t.id})">✔</button>` 
          : ''}
        <button class="btn-eliminar" onclick="eliminar(${t.id})">❌</button>
      </td>
    </tr>
  `;
});

  document.getElementById("tabla").innerHTML = html;
}

cargar();

</script>

</body>
</html>
