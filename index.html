<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>🔒 CASA NOA - NO CERRAR</title>

<!-- 🔥 FAVICON -->
<link rel="icon" href='data:image/svg+xml,
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<rect width="100" height="100" fill="black"/>
<text x="50%" y="55%" font-size="50" text-anchor="middle" fill="white">🏨</text>
</svg>'>

<style>

/* 🔥 GENERAL */
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
    margin: 0;
}

/* 🔹 HEADER */
h1 {
    background: #1e1e2f;
    color: white;
    padding: 20px;
    margin: 0;
}

/* 🔹 BOTÓN LOGOUT */
.logout-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    background: #dc3545;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.logout-btn:hover {
    background: #a71d2a;
    transform: scale(1.05);
}

/* 🔹 MENÚ */
.menu {
    margin-top: 50px;
}

.menu a {
    display: inline-block;
    margin: 15px;
    padding: 15px 25px;
    background: #007BFF;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-size: 16px;
    transition: 0.3s;
}

.menu a:hover {
    background: #0056b3;
    transform: scale(1.05);
}

/* 🔹 PIE */
.footer {
    margin-top: 60px;
    color: #777;
}

</style>
</head>

<body>

<!-- 🔐 PROTECCIÓN LOGIN -->
<script>
if (localStorage.getItem('logueado') !== 'true') {
    window.location.href = '/';
}
</script>

<!-- 🔴 BOTÓN CERRAR SESIÓN -->
<button class="logout-btn" onclick="logout()">🚪 Cerrar sesión</button>

<script>
function logout() {
    localStorage.removeItem('logueado');
    window.location.href = '/';
}
</script>

<h1>🏨 Sistema Hotelero CASA NOA</h1>

<div class="menu">
    <a href="/inventario-vista">📦 Inventario</a>
    <a href="/mantenimiento-vista">🛠️ Mantenimiento</a>
    <a href="/habitaciones-vista">🏨 Habitaciones</a>
    <a href="/limpieza-vista">🧹 Control de Limpieza</a>
</div>

<div class="footer">
    <p>creado por ovidio camaño</p>
</div>

</body>
</html>
