<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Limpieza</title>

<style>
body{
    font-family: Arial;
    background: #f5f5f5;
    padding: 20px;
}

/* 🔥 BARRA SUPERIOR */
.top-bar{
    position: absolute;
    top: 10px;
    left: 10px;
}

.top-bar button{
    margin-right: 5px;
}

.btn-inicio{
    background: #28a745;
    color: white;
    padding: 10px 15px;
    border-radius: 6px;
}

.btn-logout{
    background: #dc3545;
    color: white;
    padding: 10px 15px;
    border-radius: 6px;
}

/* TITULO */
h2{
    text-align: center;
    margin-top: 50px;
    margin-bottom: 20px;
}

/* FORMULARIO */
.form{
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
}

input, select, textarea{
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

textarea{
    resize: none;
    height: 40px;
}

button{
    background: linear-gradient(to right, #0d6efd, #0dcaf0);
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover{
    opacity: 0.9;
}

/* TABLA */
table{
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th{
    background: linear-gradient(to right, #0d6efd, #0dcaf0);
    color: white;
}

td, th{
    padding: 10px;
    text-align: center;
    border: 1px solid #ddd;
}
</style>

</head>
<body>

<!-- 🔥 BARRA SUPERIOR -->
<div class="top-bar">
    <button class="btn-inicio" onclick="irInicio()">🏠 Inicio</button>
    <button class="btn-logout" onclick="logout()">🚪 Cerrar sesión</button>
</div>

<script>
// 🔐 PROTECCIÓN LOGIN
if (localStorage.getItem('logueado') !== 'true') {
    window.location.href = '/';
}

// 🔥 API DINÁMICA (LOCAL + WEB)
const API = window.location.origin;

// 🔥 NAVEGACIÓN
function irInicio() {
    window.location.href = "/app/index.html";
}

function logout() {
    localStorage.removeItem('logueado');
    window.location.href = '/';
}
</script>

<h2>🧹 Control de Limpieza</h2>

<div class="form">

    <input type="number" id="habitacion" placeholder="Habitación">

    <select id="tipo_accion">
        <option value="">Seleccione acción</option>
        <option value="Cambio de plumones">Cambio de plumones</option>
        <option value="Cambio de pie de cama">Cambio de pie de cama</option>
        <option value="Cabecera aspirada">Cabecera aspirada</option>
        <option value="Limpieza general">Limpieza general</option>
    </select>

    <input type="date" id="fecha">

    <input type="text" id="empleado" placeholder="Empleado">

    <textarea id="observacion" placeholder="Observación"></textarea>

    <button onclick="guardar()">Guardar</button>

</div>

<table>
    <thead>
        <tr>
            <th>Habitación</th>
            <th>Acción</th>
            <th>Fecha</th>
            <th>Empleado</th>
            <th>Observación</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody id="tabla"></tbody>
</table>

<script>

let editando = false;
let idEditar = null;

// 🔥 GUARDAR
async function guardar(){

    let habitacion = document.getElementById("habitacion").value;
    let tipo_accion = document.getElementById("tipo_accion").value;
    let fecha = document.getElementById("fecha").value;
    let empleado = document.getElementById("empleado").value;
    let observacion = document.getElementById("observacion").value;

    if(!habitacion || !tipo_accion || !fecha || !empleado){
        alert("Completa todos los campos obligatorios");
        return;
    }

    if(editando){

        await fetch(`${API}/limpieza`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                id: idEditar,
                habitacion,
                tipo_accion,
                fecha,
                empleado,
                observacion
            })
        });

        editando = false;
        idEditar = null;

    } else {

        await fetch(`${API}/limpieza`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                habitacion,
                tipo_accion,
                fecha,
                empleado,
                observacion
            })
        });

    }

    limpiarFormulario();
    cargar();
}

// 🔥 LIMPIAR
function limpiarFormulario(){
    document.getElementById("habitacion").value = "";
    document.getElementById("tipo_accion").value = "";
    document.getElementById("fecha").value = "";
    document.getElementById("empleado").value = "";
    document.getElementById("observacion").value = "";
}

// 🔥 ELIMINAR
async function eliminar(id){

    if(!confirm("¿Eliminar registro?")) return;

    await fetch(`${API}/limpieza/` + id, {
        method: 'DELETE'
    });

    cargar();
}

// 🔥 EDITAR
function editar(id, habitacion, tipo_accion, fecha, empleado, observacion){

    document.getElementById("habitacion").value = habitacion;
    document.getElementById("tipo_accion").value = tipo_accion;
    document.getElementById("fecha").value = fecha.split("T")[0];
    document.getElementById("empleado").value = empleado;
    document.getElementById("observacion").value = observacion;

    editando = true;
    idEditar = id;
}

// 🔥 CARGAR
async function cargar(){

    const res = await fetch(`${API}/limpieza`);
    const data = await res.json();

    let tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    if(data.length === 0){
        tabla.innerHTML = `
            <tr>
                <td colspan="7">No hay registros aún</td>
            </tr>
        `;
        return;
    }

    data.forEach(item => {

        let fechaFormateada = new Date(item.fecha).toLocaleDateString();

        tabla.innerHTML += `
            <tr>
                <td>${item.habitacion}</td>
                <td>${item.tipo_accion}</td>
                <td>${fechaFormateada}</td>
                <td>${item.empleado}</td>
                <td>${item.observacion || ''}</td>
                <td>${item.estado}</td>
                <td>
                    <button onclick="editar(${item.id}, '${item.habitacion}', '${item.tipo_accion}', '${item.fecha}', '${item.empleado}', '${item.observacion || ''}')">✏️</button>
                    <button onclick="eliminar(${item.id})">🗑</button>
                </td>
            </tr>
        `;
    });
}

// 🔥 INICIO
cargar();

</script>

</body>
</html>
